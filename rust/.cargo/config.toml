[target.aarch64-apple-ios]
rustflags = [
    "-C", "link-arg=-mios-version-min=12.0"
]

[target.x86_64-apple-ios]
rustflags = [
    "-C", "link-arg=-mios-version-min=12.0"
]

[target.aarch64-apple-darwin]
rustflags = [
    "-C", "link-arg=-mmacosx-version-min=10.14"
]

[target.x86_64-apple-darwin]
rustflags = [
    "-C", "link-arg=-mmacosx-version-min=10.14"
]
